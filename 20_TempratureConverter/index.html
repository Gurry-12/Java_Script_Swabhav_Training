<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temprature converter</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <form>
      <h1>Temperature Converter</h1>
      <input type="number" id="textBox" value="0" /><br />

      <input type="radio" id="toFahrenheit" name="unit" />
      <label for="toFahrenheit"
        >Celsius <i class="fa-solid fa-arrow-right"></i> Fahrenheit</label
      ><br />

      <input type="radio" id="toKelvin" name="unit" />
      <label for="toKelvin"
        >Celsius <i class="fa-solid fa-arrow-right"></i> Kelvin</label
      ><br />

      <input type="radio" id="toCelsius" name="unit" />
      <label for="toCelsius"
        >Fahrenheit <i class="fa-solid fa-arrow-right"></i> Celsius</label
      ><br />

      <input type="radio" id="toKelvin" name="unit" />
      <label for="toKelvin"
        >Fahrenheit <i class="fa-solid fa-arrow-right"></i> Kelvin</label
      ><br />

      <input type="radio" id="toCelsius" name="unit" />
      <label for="toCelsius"
        >Kelvin <i class="fa-solid fa-arrow-right"></i> Celsius</label
      ><br />

      <input type="radio" id="toFahrenheit" name="unit" />
      <label for="toFahrenheit"
        >Kelvin <i class="fa-solid fa-arrow-right"></i> Fahrenheit</label
      ><br />

      <button type="button" onclick="convert()">submit</button>
      <p id="result"></p>
    </form>

    <script src="script.js"></script>
  </body>
</html>
