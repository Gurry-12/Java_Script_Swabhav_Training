<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="generator-card">
      <h1>Password Generator</h1>

      <div class="result-container">
        <span id="showData">Click Generate...</span>
      </div>

      <div class="settings-container">
        <div class="setting-row">
          <label for="passwordLength">Password Length</label>
          <input type="number" id="passwordLength" min="4" max="50" value="12" />
        </div>

        <div class="setting-row checkbox-row">
          <input type="checkbox" id="hasDigit" checked />
          <label for="hasDigit">Include Numbers</label>
        </div>

        <div class="setting-row checkbox-row">
          <input type="checkbox" id="hasUpperCase" checked />
          <label for="hasUpperCase">Include Uppercase Letters</label>
        </div>

        <div class="setting-row checkbox-row">
          <input type="checkbox" id="hasLowerCase" checked />
          <label for="hasLowerCase">Include Lowercase Letters</label>
        </div>

        <div class="setting-row checkbox-row">
          <input type="checkbox" id="hasSpecialChars" />
          <label for="hasSpecialChars">Include Special Characters</label>
        </div>
      </div>

      <button type="button" class="generate-btn" onclick="getPassword()">
        Generate Password
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
