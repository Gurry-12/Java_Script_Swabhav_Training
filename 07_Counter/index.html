<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenCount - Soothing Interactive Counter</title>
    <!-- Google Fonts for premium modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Lucide icons for beautiful interface icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background blurred colorful blobs -->
    <div class="background-decorations">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div class="counter-container">
      <!-- Main Dashboard Card -->
      <div id="counter-card">
        <!-- Top Toolbar -->
        <div class="toolbar">
          <div class="app-title">
            <i data-lucide="plus-circle" class="title-icon"></i>
            <span>ZenCount</span>
          </div>
          
          <div class="toolbar-actions">
            <!-- Settings Toggle -->
            <button id="settings-toggle" class="icon-btn" title="Toggle Boundary Limits" aria-label="Toggle Boundary Limits">
              <i data-lucide="sliders"></i>
            </button>
            <!-- Theme Toggle -->
            <button id="theme-toggle" class="icon-btn" title="Toggle Theme" aria-label="Toggle Theme">
              <i data-lucide="sun" class="sun-icon"></i>
              <i data-lucide="moon" class="moon-icon"></i>
            </button>
          </div>
        </div>

        <!-- Step Selector Row -->
        <div class="step-container">
          <span class="step-label">Step Size</span>
          <div class="step-selector">
            <button class="step-btn active" data-step="1">1</button>
            <button class="step-btn" data-step="5">5</button>
            <button class="step-btn" data-step="10">10</button>
            <button class="step-btn" data-step="25">25</button>
          </div>
        </div>

        <!-- Count Value Display Panel -->
        <div class="display-panel">
          <div id="countLabel" class="count-digits neutral">0</div>
          <div class="warning-badge id" id="warning-badge">Limit Reached</div>
        </div>

        <!-- Collapsible Settings Panel (Min/Max Boundaries) -->
        <div id="settings-drawer" class="settings-drawer collapsed">
          <div class="settings-grid">
            <div class="input-group">
              <label for="min-limit">Min Limit</label>
              <input type="number" id="min-limit" placeholder="No limit" />
            </div>
            <div class="input-group">
              <label for="max-limit">Max Limit</label>
              <input type="number" id="max-limit" placeholder="No limit" />
            </div>
          </div>
        </div>

        <!-- Actions Panel (Decrease, Reset, Increase) -->
        <div class="actions-container">
          <button id="decreaseBtn" class="action-btn dec-btn" title="Decrease Count (Down Arrow)">
            <i data-lucide="minus"></i>
          </button>
          
          <button id="resetBtn" class="action-btn reset-btn" title="Reset Count (R or Backspace)">
            <i data-lucide="rotate-ccw"></i>
          </button>
          
          <button id="increaseBtn" class="action-btn inc-btn" title="Increase Count (Up Arrow)">
            <i data-lucide="plus"></i>
          </button>
        </div>

        <!-- Activity Logs Track List -->
        <div class="logs-container">
          <div class="logs-header">
            <span>Recent Activity</span>
            <button id="clear-logs" class="clear-logs-btn">Clear</button>
          </div>
          <div id="logs-list" class="logs-list">
            <div class="empty-logs">No activity logged yet</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
      lucide.createIcons();
    </script>
    <script src="index.js"></script>
  </body>
</html>
